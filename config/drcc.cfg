#------------------------------------------------------------------------------
# SPEC CPU2017 config for drcc (DataRecomputation Compiler)
#
# Usage (inside Docker):
#   source /spec2017/shrc
#   runcpu --config=drcc.cfg --action=build 505.mcf_r
#   runcpu --config=drcc.cfg --action=run   505.mcf_r
#
# Or via the orchestrator:
#   docker run --rm -v /path/to/SPEC2017:/spec2017 -v ./results:/results \
#     drcc-spec 505.mcf_r 519.lbm_r
#------------------------------------------------------------------------------

%ifndef %{build_ncpus}
%   define build_ncpus 8
%endif

%ifndef %{label}
%   define label drcc
%endif

%define os LINUX
%define model -m64

# Where instrumented-run.sh writes /usr/bin/time + perf output.
%ifndef %{results_dir}
%   define results_dir /results
%endif

# DR stats directory (set per-benchmark by run-spec.sh).
%ifndef %{stats_dir}
%   define stats_dir
%endif


#--------- Global Settings ---------------------------------------------------
command_add_redirect = 1
iterations           = 1
label                = %{label}
line_width           = 1020
log_line_width       = 1020
makeflags            = --jobs=%{build_ncpus}
mean_anyway          = 1
output_format        = txt,csv
reportable           = 0
tune                 = base
ignore_errors        = 1
preenv               = 1

intrate,fprate:
   copies = 1
intspeed,fpspeed:
   threads = 1


#--------- Compilers ---------------------------------------------------------
default:
   CC                  = drcc -std=c99 %{model}
   CXX                 = drcc %{model}
   # Fortran benchmarks can't use drcc — fail explicitly.
   FC                  = /bin/false
   CC_VERSION_OPTION   = --version
   CXX_VERSION_OPTION  = --version
   FC_VERSION_OPTION   = --version

default:
   sw_base_ptrsize = 64-bit
   sw_peak_ptrsize = 64-bit

# Pass DR_STATS_DIR to the build environment so drcc can capture
# per-load classification diagnostics (SINGLE/MULTI/LEAKED/KILLED).
default:
   preENV_DR_STATS_DIR        = %{stats_dir}
   preENV_LD_LIBRARY_PATH     = /opt/llvm/lib:/usr/lib/x86_64-linux-gnu

# Run-time instrumentation: wrap each benchmark invocation with
# /usr/bin/time (peak memory, wall time) and optionally perf stat.
default:
   submit = /opt/drcc/scripts/instrumented-run.sh %{results_dir} $command


#--------- Portability -------------------------------------------------------
default:
   EXTRA_PORTABILITY = -DSPEC_LP64

500.perlbench_r,600.perlbench_s:  #lang='C'
   PORTABILITY = -DSPEC_LINUX_X64

521.wrf_r,621.wrf_s:  #lang='F,C'
   CPORTABILITY = -DSPEC_CASE_FLAG

523.xalancbmk_r,623.xalancbmk_s:  #lang='CXX'
   PORTABILITY = -DSPEC_LINUX

526.blender_r:  #lang='CXX,C'
   PORTABILITY = -funsigned-char -DSPEC_LINUX

527.cam4_r,627.cam4_s:  #lang='F,C'
   PORTABILITY = -DSPEC_CASE_FLAG

628.pop2_s:  #lang='F,C'
   CPORTABILITY = -DSPEC_CASE_FLAG


#--------- Base Tuning -------------------------------------------------------
default=base:
   OPTIMIZE = -O2

intrate,intspeed=base:
   EXTRA_COPTIMIZE = -fno-strict-aliasing
   LDCFLAGS        = -z muldefs

#--------- Peak Tuning -------------------------------------------------------
default=peak:
   basepeak = yes


#--------- System Description ------------------------------------------------
default:
   sw_compiler001 = drcc (DataRecomputation Compiler)
   sw_compiler002 = LLVM 22 + Polygeist cgeist (LLVM 18)

intrate,intspeed,fprate,fpspeed:
   hw_vendor    = Test
   tester       = Test
   test_sponsor = Test
   license_num  = 0
